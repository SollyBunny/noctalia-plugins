id = "aurelia/cpu_clock_speed"
name = "CPU Clock Speed"
version = "1.0.0"
plugin_api = 3
author = "Aurelia"
license = "MIT"
dependencies = []
tags = ["bar"]
icon = "cpu"
description = "Show the clock speed of your CPU"

[[widget]]
id = "widget"
entry = "widget.luau"

	[[widget.setting]]
	key = "glyph"
	type = "glyph"
	label_key = "settings.glyph.label"
	description_key = "settings.glyph.description"
	default = "cpu"

	[[widget.setting]]
	key = "show_glyph"
	type = "bool"
	label_key = "settings.show_glyph.label"
	default = true
