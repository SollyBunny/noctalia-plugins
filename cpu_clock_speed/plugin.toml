id = "noctalia/cpu_clock_speed"
name = "CPU Clock Speed"
version = "1.0.0"
min_noctalia = "5.0.0"
author = "Aurelia"
license = "MIT"
dependencies = []
tags = ["perf"]
icon = "cpu"
description = "Show the clock speed of your CPU"

[[widget]]
id = "cpu_clock_speed"
entry = "widget.luau"

  [[widget.setting]]
  key = "glyph"
  type = "glyph"
  label = "Glyph"
  description = "Glyph to show"
  default = "cpu"

  [[widget.setting]]
  key = "show_glyph"
  type = "bool"
  label = "Show glyph"
  default = true
